name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # 單元測試是純函式、next build 也用不到真瀏覽器——跳過 Chromium 下載讓 CI 快很多
      - run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm run test
      - run: npm run build
